name: Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Release notes (optional)
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Bump minor version
        id: bump
        run: |
          chmod +x scripts/bump-version.sh
          NEW_VERSION="$(./scripts/bump-version.sh minor)"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} (minor release)"
          git push

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode and setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_DEBUG_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_DEBUG_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_DEBUG_KEY_PASSWORD }}
        run: |
          if [[ -z "$KEYSTORE_BASE64" ]]; then
            echo "ANDROID_DEBUG_KEYSTORE_BASE64 not set; release build will use debug keystore fallback."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "${{ runner.temp }}/debug.keystore"
          echo "ANDROID_KEYSTORE_PATH=${{ runner.temp }}/debug.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD:-android}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=${KEY_ALIAS:-androiddebugkey}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=${KEY_PASSWORD:-android}" >> "$GITHUB_ENV"

      - name: Build release APK and AAB
        run: |
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Collect build artifacts
        run: |
          mkdir -p release-assets
          SIGNED_APK="app/build/outputs/apk/release/app-release.apk"
          if [[ -f "$SIGNED_APK" ]]; then
            APK_PATH="$SIGNED_APK"
          else
            APK_PATH="$(find app/build/outputs/apk/release -name '*.apk' ! -name '*-unsigned.apk' | head -n 1)"
          fi
          if [[ -z "$APK_PATH" || ! -f "$APK_PATH" ]]; then
            echo "Signed release APK not found under app/build/outputs/apk/release"
            ls -la app/build/outputs/apk/release || true
            exit 1
          fi
          SDK_ROOT="${ANDROID_HOME:-$HOME/.android/sdk}"
          APKSIGNER="$(find "$SDK_ROOT/build-tools" -name apksigner -type f 2>/dev/null | sort -V | tail -n 1)"
          if [[ -z "$APKSIGNER" || ! -x "$APKSIGNER" ]] || ! "$APKSIGNER" verify "$APK_PATH" >/dev/null 2>&1; then
            echo "APK is not signed: $APK_PATH"
            exit 1
          fi
          cp "$APK_PATH" "release-assets/appsearch-${{ steps.bump.outputs.new_version }}.apk"
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          if [[ -f "$AAB_PATH" ]]; then
            cp "$AAB_PATH" "release-assets/appsearch-${{ steps.bump.outputs.new_version }}.aab"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.bump.outputs.new_version }}"
          NOTES="${{ github.event.inputs.release_notes }}"
          if [[ -z "$NOTES" ]]; then
            NOTES="Release v${{ steps.bump.outputs.new_version }}"
          fi
          gh release create "$TAG" \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --notes "$NOTES" \
            release-assets/*
